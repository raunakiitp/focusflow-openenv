[project]
name = "focusflow-env"
version = "0.1.0"
description = "FocusFlow OpenEnv environment"
requires-python = ">=3.8"
dependencies = [
  "openenv-core",
  "pydantic",
  "fastapi",
  "uvicorn",
  "openai",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
